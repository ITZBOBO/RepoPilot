  <defs>
    <radialGradient id="grad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#070E1A" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Logo dot -->
  <circle cx="480" cy="240" r="10" fill="#F59E0B"/>
